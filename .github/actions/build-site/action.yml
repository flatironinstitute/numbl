name: "Build numbl site"
description: "Bundle a numbl project into a static, browser-runnable site and prepare it as a GitHub Pages artifact."

inputs:
  project-dir:
    description: "Directory containing the numbl project files (.m, .md, data, …)."
    default: "."
  out-dir:
    description: "Output directory for the built site / Pages artifact."
    default: "_site"
  base:
    description: "Deploy base path, e.g. /my-repo/. Leave empty to auto-detect from the repository name (root for <owner>.github.io, /<repo>/ otherwise)."
    default: ""
  title:
    description: "Site title (overrides numbl-project.json)."
    default: ""
  entry:
    description: "Default file to open in the viewer, e.g. main.m."
    default: ""
  numbl-version:
    description: "numbl npm version to use (must include the build-site command)."
    default: "latest"
  node-version:
    description: "Node.js version."
    default: "20"
  upload-artifact:
    description: "Upload the output as a GitHub Pages artifact (set false to only build)."
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Build numbl site
      shell: bash
      env:
        REPO_NAME: ${{ github.event.repository.name }}
        OWNER: ${{ github.repository_owner }}
      run: |
        set -euo pipefail
        BASE='${{ inputs.base }}'
        if [ -z "$BASE" ]; then
          repo_lc=$(printf '%s' "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
          owner_lc=$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')
          if [ "$repo_lc" = "$owner_lc.github.io" ]; then
            BASE="/"
          else
            BASE="/$REPO_NAME/"
          fi
        fi
        args=( '${{ inputs.project-dir }}' --out '${{ inputs.out-dir }}' --base "$BASE" )
        if [ -n '${{ inputs.title }}' ]; then args+=( --title '${{ inputs.title }}' ); fi
        if [ -n '${{ inputs.entry }}' ]; then args+=( --entry '${{ inputs.entry }}' ); fi
        echo "numbl build-site ${args[*]}"
        npx --yes "numbl@${{ inputs.numbl-version }}" build-site "${args[@]}"

    - name: Configure Pages
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/configure-pages@v4

    - name: Upload Pages artifact
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-pages-artifact@v3
      with:
        path: ${{ inputs.out-dir }}
