name: WASM Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-wasm:
    name: Build & Test WASM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Install dependencies
        run: npm ci

      - name: Bundle stdlib
        run: npm run bundle:stdlib

      - name: Build WASM modules (simple)
        run: npm run build:wasm

      - name: Run WASM tests
        run: npm run test
