name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Bundle stdlib
        run: npm run bundle:stdlib

      - name: Check formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Check generated snippets are in sync
        run: npm run build:snippets:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests (float64)
        run: npm run test

  test-browser:
    name: Test Browser (Playwright)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build browser package
        run: npm run build:browser

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser test-runner
        run: npm run test:browser

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  test-lapack:
    name: Test LAPACK Addon
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install libopenblas and libfftw3
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev libfftw3-dev

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build native addon
        run: npm run build:addon

      # These two tests load the freshly-built addon directly and compare it
      # against the pure-TS twins (op-code enums + numeric results). They
      # skip themselves when the addon is absent, so they are no-ops in the
      # plain `test` job — this is the only place they actually run.
      - name: Run addon parity tests (TS twins ↔ C addon)
        run: npx vitest run src/__tests__/op-codes-sync.test.ts src/__tests__/native-ops-parity.test.ts
