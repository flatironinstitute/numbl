name: Benchmarks

# Runs the full `benchmarks/*.m` suite under `--opt 1`, `--opt e1`, and
# `--opt e1 --par` on Linux and macOS (in parallel), takes the median of
# 3 runs per (benchmark, mode), and publishes to `magland/numbl-benchmarks`
# via github-action-benchmark. Chart lives at
# https://magland.github.io/numbl-benchmarks/dev/bench/.
#
# Architecture: matrix jobs run in parallel and upload their results as
# artifacts. A final `publish` job downloads both artifacts and pushes
# them to the data repo sequentially — avoids race conditions on the
# gh-pages branch without serializing the expensive benchmark runs.
#
# Intentionally independent from the main CI: failures here do not gate
# merges. A push to main triggers one run; `workflow_dispatch` lets you
# re-run on demand.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one benchmark workflow run at a time across the whole repo, so
# two concurrent pushes don't race to update numbl-benchmarks' gh-pages
# branch from different publish jobs.
concurrency:
  group: benchmarks
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            par-cc: ""
          - os: macos-latest
            label: macOS
            # Apple clang doesn't ship with OpenMP threading — use Homebrew
            # gcc for the --par mode only. Installed below.
            par-cc: gcc-14
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install openblas + fftw (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev libfftw3-dev

      # macOS uses the system Accelerate framework for BLAS/LAPACK, so only
      # fftw (and gcc for the --par mode) needs to be installed from brew.
      - name: Install fftw + gcc (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install fftw gcc@14

      - name: Install dependencies
        run: npm ci

      - name: Bundle stdlib
        run: npm run bundle:stdlib

      - name: Build native addon (includes libnumbl_ops.a)
        run: npm run build:addon

      - name: Run benchmarks (median of 3)
        env:
          NUMBL_PAR_CC: ${{ matrix.par-cc }}
        run: npx tsx benchmarks/run_benchmarks.ts benchmarks-results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.os }}
          path: benchmarks-results.json
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: benchmark
    # Even if one OS errored, publish whatever the other produced. The
    # download-artifact step guards against a fully-empty set.
    if: always() && needs.benchmark.result != 'skipped' && needs.benchmark.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux results
        id: dl-linux
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: benchmark-results-ubuntu-latest
          path: results/linux

      - name: Download macOS results
        id: dl-macos
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: benchmark-results-macos-latest
          path: results/macos

      # Each github-action-benchmark call clones the data repo into
      # ./benchmark-data-repository and does not clean it up, so the
      # second call would fail with "destination path already exists".
      # We remove it between calls; each invocation then fetches the
      # latest gh-pages state fresh, appends its entry, and pushes — so
      # the second call naturally rebases onto the first call's commit.
      - name: Publish Linux results
        if: steps.dl-linux.outcome == 'success'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: numbl benchmarks (Linux)
          tool: customSmallerIsBetter
          output-file-path: results/linux/benchmarks-results.json
          gh-repository: github.com/magland/numbl-benchmarks
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.BENCHMARK_PAT }}
          auto-push: true
          # Alerts off per project policy — we're just tracking trends.
          alert-threshold: "200%"
          comment-on-alert: false
          fail-on-alert: false

      - name: Clean benchmark data clone between publishes
        if: steps.dl-linux.outcome == 'success' && steps.dl-macos.outcome == 'success'
        run: rm -rf ./benchmark-data-repository

      - name: Publish macOS results
        if: steps.dl-macos.outcome == 'success'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: numbl benchmarks (macOS)
          tool: customSmallerIsBetter
          output-file-path: results/macos/benchmarks-results.json
          gh-repository: github.com/magland/numbl-benchmarks
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.BENCHMARK_PAT }}
          auto-push: true
          alert-threshold: "200%"
          comment-on-alert: false
          fail-on-alert: false
