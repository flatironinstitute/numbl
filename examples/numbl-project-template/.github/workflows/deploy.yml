name: Deploy numbl project to GitHub Pages

# Builds this numbl project into a static, browser-runnable site and publishes
# it to GitHub Pages on every push to main.
#
# One-time setup: in the repository settings, set Pages → "Build and deployment"
# → Source to "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: flatironinstitute/numbl/.github/actions/build-site@main
        with:
          project-dir: .
          # base path is auto-detected from the repo name; override if needed:
          # base: /my-repo/
          # numbl-version: latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
